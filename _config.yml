title: Savosky Wright
description: Content Writer for Tech, Crypto and HR Brands
url: "https://savosky-wright.netlify.app"
baseurl: ""

plugins:
  - jekyll-sitemap
  - jekyll-feed

markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

      exclude:
  - admin/
  - google31addf4a153a2066.html
  - Gemfile
  - Gemfile.lock
  - netlify.toml