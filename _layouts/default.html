<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | Savosky Wright</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Content writer specialising in Tech, Crypto and HR. Clear, research-driven writing that builds trust and drives action.{% endif %}" />
  <meta name="author" content="Savosky Wright" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:title" content="{{ page.title }} | Savosky Wright" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Content writer specialising in Tech, Crypto and HR. Clear, research-driven writing that builds trust and drives action.{% endif %}" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:site_name" content="Savosky Wright" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{ page.title }} | Savosky Wright" />
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}Content writer specialising in Tech, Crypto and HR. Clear, research-driven writing that builds trust and drives action.{% endif %}" />

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />
  <link rel="stylesheet" href="/CSS/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="/JS/script.js" defer></script>
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="nav-logo">
        <a href="/index.html">
          <img src="/Images/logo.png" alt="Savosky Wright" class="logo-img" />
        </a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/index.html">Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/portfolio.html">Portfolio</a></li>
        <li><a href="/services.html">Services</a></li>
        <li><a href="/blog.html">Blog</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  {{ content }}

  <footer class="footer">
    <p>© 2026 Savosky Wright. All rights reserved.</p>
    <p class="footer-links">
      <a href="/privacy-policy.html">Privacy Policy</a>
    </p>
 </footer>

</body>
</html>
